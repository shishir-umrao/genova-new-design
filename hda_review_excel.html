            </div>
          `;
                })(field.ruleVersion)}
      </div>
    </div>
  `;

            // EP options — use available_values radios when populated, otherwise manual entry
            const opts = document.getElementById('mEpOpts');
            const availableValues = field.ruleVersion?.available_values;
            const hasAvailableValues = Array.isArray(availableValues) && availableValues.length > 0;
            const currentVal = cellValue[ndcId][fieldKey];
            const isPending = cell.state === 'pending';

            const extractedSel = isPending || currentVal === cell.ex;
            let optsHtml = `
    <div class="ep-opt ${extractedSel ? 'sel' : ''}" onclick="mSelOpt(this)" data-val="${escAttr(cell.ex)}">
      <div class="eo-rd"><div class="eo-dt"></div></div>
      <div class="eo-b"><div class="eo-lbl">Accept extracted value</div><div class="eo-val">${cell.ex}</div></div>
    </div>`;

            if (hasAvailableValues) {
                availableValues.forEach(val => {
                    const isSel = !isPending && !extractedSel && currentVal === val;
                    optsHtml += `
    <div class="ep-opt ${isSel ? 'sel' : ''}" onclick="mSelOpt(this)" data-val="${escAttr(val)}">
      <div class="eo-rd"><div class="eo-dt"></div></div>
      <div class="eo-b"><div class="eo-lbl">${val}</div></div>
    </div>`;
                });
            } else {
                const isManual = !isPending && currentVal !== cell.ex;
                const manualDisplay = isManual ? currentVal : '—';
                optsHtml += `
    <div class="ep-opt ${isManual ? 'sel' : ''}" onclick="mSelOpt(this)" data-type="manual">
      <div class="eo-rd"><div class="eo-dt"></div></div>
      <div class="eo-b"><div class="eo-lbl">Manually enter value</div><div class="eo-val mpv">${manualDisplay}</div></div>
    </div>`;
                document.getElementById('mManInp').value = isManual ? currentVal : '';
            }

            opts.innerHTML = optsHtml;
            if (hasAvailableValues) {
                document.getElementById('mManSec').style.display = 'none';
                document.getElementById('mManInp').value = '';
            } else {
                const isManual = !isPending && currentVal !== cell.ex;
                document.getElementById('mManSec').style.display = isManual ? 'block' : 'none';
            }

            syncManCharCount(fieldKey);

            document.getElementById('applyAllNdcChk').checked = false;
            document.getElementById('applyAllNdcLbl').textContent =
                `Apply this to all ${NDCS.length} NDC${NDCS.length === 1 ? '' : 's'}`;

            document.getElementById('modalOv').classList.add('open');
        }

        function mSelOpt(el) {
            el.closest('.ep-opts').querySelectorAll('.ep-opt').forEach(o => o.classList.remove('sel'));
            el.classList.add('sel');
            document.getElementById('mManSec').style.display = el.dataset.type === 'manual' ? 'block' : 'none';
            if (modalCell) syncManCharCount(modalCell.fieldKey);
        }

        function getModalSelectedVal() {
            const sel = document.getElementById('mEpOpts').querySelector('.ep-opt.sel');
            if (!sel) return null;
            if (sel.dataset.type === 'manual') return document.getElementById('mManInp').value.trim() || null;
            return sel.dataset.val;
        }

        function modalAccept() {
            if (!modalCell) return;
            const sel = document.getElementById('mEpOpts').querySelector('.ep-opt.sel');
            if (!sel) return;
            const v = getModalSelectedVal();
            const { fieldKey } = modalCell;
            const applyAll = document.getElementById('applyAllNdcChk').checked;
            const targetNdcIds = applyAll ? NDCS.map(n => n.id) : [modalCell.ndcId];

            targetNdcIds.forEach(ndcId => {
                if (v !== null) cellValue[ndcId][fieldKey] = v;
                cellState[ndcId][fieldKey] = 'ac';
            });

            if (applyAll) refreshColCells(fieldKey);
            else refreshCell(modalCell.ndcId, fieldKey);
            updateProg();
            closeModal();
        }

        function modalEdit() {
            const manualOpt = document.getElementById('mEpOpts').querySelector('[data-type="manual"]');
            if (!manualOpt) return;
            mSelOpt(manualOpt);
        }

        function modalReject() {
            if (!modalCell) return;
            cellState[modalCell.ndcId][modalCell.fieldKey] = 'rj';
            refreshCell(modalCell.ndcId, modalCell.fieldKey);
            updateProg();
            closeModal();
        }

        function refreshCell(ndcId, fieldKey) {
            const td = document.querySelector(`td[data-ndc="${ndcId}"][data-field="${fieldKey}"]`);
            if (td) updateTd(td, ndcId, fieldKey);
        }

        function closeModal() { document.getElementById('modalOv').classList.remove('open'); modalCell = null; }
        function closeModalOv(e) { if (e.target === document.getElementById('modalOv')) closeModal(); }

        function syncManCharCount(fieldKey) {
            const el = document.getElementById('mManCharCount');
            const fieldName = FIELDS.find(f => f.key === fieldKey)?.label;
            const show = DESC_CHAR_LIMIT_FIELDS.has(fieldName);
            el.style.display = show ? 'block' : 'none';
            if (!show) return;
            const count = document.getElementById('mManInp').value.length;
            el.textContent = `${count}/${DESC_CHAR_LIMIT}`;
            el.classList.toggle('ok', count <= DESC_CHAR_LIMIT);
            el.classList.toggle('over', count > DESC_CHAR_LIMIT);
        }

        function liveP(inp) {
            const p = document.getElementById('mEpOpts').querySelector('.mpv');
            if (p) p.textContent = inp.value || '—';
            if (modalCell) syncManCharCount(modalCell.fieldKey);
        }
        function toggleRvAcc() { document.getElementById('rvAcc').classList.toggle('open'); }
        function handleR(sel) { sel.closest('.man-sec').querySelector('.cust-wrap').style.display = sel.value === 'custom' ? 'block' : 'none'; }

        // ─── THEME ───────────────────────────────────────────────────────────────────
        const SUN = 'M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 7a5 5 0 100 10A5 5 0 0012 7z';
        const MOON = 'M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z';
        let dark = false;
        document.getElementById('xlBody').addEventListener('mousedown', (e) => {
            if (e.target.closest('.ndc-pm-count')) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        document.getElementById('xlBody').addEventListener('click', (e) => {
            const badge = e.target.closest('.ndc-pm-count');
            if (!badge) return;
            e.preventDefault();
            e.stopPropagation();
            const safeId = badge.dataset.ndcSafeId;
            if (safeId) scrollToPmNdc(safeId, e);
        }, true);

        document.getElementById('tBtn').addEventListener('click', () => {
            dark = !dark;
            document.body.dataset.theme = dark ? 'dark' : 'light';
            document.getElementById('tIco').innerHTML = dark ? `<path d="${SUN}"/>` : `<path d="${MOON}"/>`;
        });

        document.querySelectorAll('.n-tab').forEach(t => t.addEventListener('click', function () {
            document.querySelectorAll('.n-tab').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
        }));

        // ─── INIT ────────────────────────────────────────────────────────────────────
        loadJsonData();
    </script>
</body>

</html>
